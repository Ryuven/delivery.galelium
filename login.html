<!DOCTYPE html>
<html lang="tg">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0,viewport-fit=cover"/>
<meta name="mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<title>dastdaroz ID — Вуруд</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Nunito:wght@700;800;900&family=Inter:wght@300;400;500;600;700&display=swap"/>
<style>
:root{
  --acc:#1a9e4a;--acc2:#22c55e;
  --accd:rgba(26,158,74,.09);--accg:rgba(26,158,74,.22);
  --acc-shadow:rgba(26,158,74,.28);
  --red:#dc2626;--amber:#d97706;
  --tx:#111815;--tx2:#374b3e;--tx3:#8fa898;
  --b:#e3ebe6;
  --s2:#f4f8f5;--s3:#eaf0ec;
  --fd:'Nunito',sans-serif;--fs:'Inter',system-ui,sans-serif;
  --ease:cubic-bezier(.32,0,.18,1);--tf:.14s;
}

*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html{height:100%;-webkit-text-size-adjust:100%}

body{
  background:#fff;color:var(--tx);font-family:var(--fs);
  min-height:100svh;-webkit-font-smoothing:antialiased;
  display:flex;flex-direction:column;align-items:center;
  padding:52px 24px 40px;
}

/* ── Progress bar ── */
.fb-bar{
  position:fixed;top:0;left:0;right:0;height:2px;z-index:999;
  background:linear-gradient(90deg,var(--acc),var(--acc2));
  transform-origin:left;transform:scaleX(0);
  transition:transform .4s var(--ease);
}
.fb-bar.loading{transform:scaleX(.6)}
.fb-bar.done{transform:scaleX(1);opacity:0;transition:transform .2s,opacity .3s ease .2s}

/* ── Wrap ── */
.wrap{
  width:100%;max-width:360px;
  display:flex;flex-direction:column;
  animation:fadeUp .32s var(--ease) both;
}
@keyframes fadeUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}

/* ── Logo ── */
.logo{display:flex;justify-content:center;margin-bottom:40px}
.logo img{height:52px;width:auto;object-fit:contain}

/* ── Heading ── */
.hd{margin-bottom:32px}
.form-title{
  font-family:var(--fd);font-weight:900;font-size:1.55rem;
  color:var(--tx);letter-spacing:-.025em;line-height:1.15;
  margin-bottom:5px;
}
.form-title em{color:var(--acc);font-style:normal}
.form-sub{font-size:.78rem;color:var(--tx3);line-height:1.5}

/* ── Tabs ── */
.tabs{
  display:flex;
  border-bottom:1.5px solid var(--b);
  margin-bottom:28px;
}
.tab{
  flex:1;padding:10px 4px 11px;text-align:center;
  border:none;background:none;cursor:pointer;
  font-family:var(--fs);font-size:.78rem;font-weight:600;color:var(--tx3);
  border-bottom:2px solid transparent;margin-bottom:-1.5px;
  transition:color var(--tf),border-color var(--tf);
}
.tab.active{color:var(--acc);border-bottom-color:var(--acc);font-weight:700}
.tab:hover:not(.active){color:var(--tx2)}

/* ── Alert ── */
.alert{
  display:none;align-items:flex-start;gap:9px;
  padding:12px 14px;margin-bottom:18px;
  border-radius:12px;font-size:.73rem;color:var(--tx2);
  line-height:1.5;border:1.5px solid;
}
.alert.show{display:flex}
.alert.err{background:rgba(220,38,38,.04);border-color:rgba(220,38,38,.15)}
.alert strong{display:block;font-size:.69rem;font-weight:700;margin-bottom:2px;color:var(--red)}

/* ── Field ── */
.field{position:relative;margin-bottom:14px}
.lbl{
  font-size:.6rem;letter-spacing:.14em;text-transform:uppercase;
  color:var(--tx3);display:block;margin-bottom:7px;font-weight:700;
}

/* ── Input ── */
.inp{
  width:100%;background:#fff;
  border:1.5px solid var(--b);border-radius:13px;
  color:var(--tx);font-family:var(--fs);font-size:.88rem;font-weight:400;
  padding:13px 15px;outline:none;
  transition:border-color var(--tf),box-shadow var(--tf);
}
.inp:focus{border-color:var(--acc);box-shadow:0 0 0 3px var(--accd)}
.inp.has-eye{padding-right:46px}
.inp.err{border-color:rgba(220,38,38,.5);animation:shake .3s ease}
.inp::placeholder{color:var(--tx3)}
@keyframes shake{0%,100%{transform:translateX(0)}22%,66%{transform:translateX(-4px)}44%,88%{transform:translateX(4px)}}
.field-err{font-size:.62rem;color:var(--red);margin-top:5px;display:none}
.field-err.show{display:block}

/* ── Phone field ── */
.phone-field{
  display:flex;align-items:stretch;
  border:1.5px solid var(--b);border-radius:13px;overflow:hidden;
  background:#fff;
  transition:border-color var(--tf),box-shadow var(--tf);
}
.phone-field:focus-within{border-color:var(--acc);box-shadow:0 0 0 3px var(--accd)}
.phone-prefix{
  display:flex;align-items:center;gap:7px;padding:0 14px;
  background:var(--s2);border-right:1.5px solid var(--b);
  font-family:var(--fs);font-weight:700;font-size:.86rem;color:var(--tx2);
  flex-shrink:0;user-select:none;
}
.phone-flag{width:14px;height:21px;border-radius:2px;flex-shrink:0;box-shadow:0 0 0 1px rgba(0,0,0,.10);object-fit:cover;display:block}
.phone-input{
  flex:1;min-width:0;border:none;background:none;outline:none;
  color:var(--tx);font-family:var(--fs);font-size:.88rem;font-weight:500;
  padding:13px 15px 13px 11px;letter-spacing:.03em;
}
.phone-input::placeholder{color:var(--tx3)}

/* ── Eye toggle ── */
.eye{
  position:absolute;right:0;bottom:0;width:46px;height:46px;
  background:none;border:none;cursor:pointer;color:var(--tx3);
  display:flex;align-items:center;justify-content:center;transition:color var(--tf);
}
.eye:hover{color:var(--tx2)}

/* ── Password strength ── */
.ps-bars{display:flex;gap:4px;margin-top:9px}
.ps-bar{flex:1;height:3px;border-radius:2px;background:var(--s3);transition:background .3s}
.ps-lbl{font-size:.6rem;color:var(--tx3);margin-top:5px;display:none}

/* ── Phone chip (step 2) ── */
.phone-chip{
  display:flex;align-items:center;gap:10px;
  border:1.5px solid var(--b);border-radius:13px;
  padding:11px 13px;margin-bottom:16px;background:var(--s2);
}
.phone-chip-ico{
  width:28px;height:28px;border-radius:8px;flex-shrink:0;
  background:#fff;border:1px solid var(--b);
  display:flex;align-items:center;justify-content:center;color:var(--acc);
}
.phone-chip-num{flex:1;font-family:var(--fs);font-weight:700;font-size:.84rem;color:var(--tx);letter-spacing:.02em}
.phone-chip-edit{
  background:none;border:none;cursor:pointer;color:var(--acc);
  font-size:.68rem;font-weight:700;font-family:var(--fs);
  padding:4px 8px;border-radius:7px;
  display:flex;align-items:center;gap:4px;transition:opacity var(--tf);
}
.phone-chip-edit:hover{opacity:.65}

/* ── Opt row ── */
.opt-row{display:flex;justify-content:flex-end;margin-bottom:14px}
.forgot{
  font-size:.7rem;color:var(--tx3);background:none;border:none;
  cursor:pointer;font-family:var(--fs);padding:0;
  transition:color var(--tf);text-decoration:none;
}
.forgot:hover{color:var(--acc)}

/* ── Terms ── */
.terms{font-size:.68rem;color:var(--tx3);margin-bottom:14px;line-height:1.65}
.terms a{color:var(--acc);text-decoration:none}
.terms a:hover{text-decoration:underline}

/* ── Submit button ── */
.btn-submit{
  width:100%;padding:15px;
  background:var(--acc);border:none;border-radius:13px;
  color:#fff;font-family:var(--fd);font-weight:900;font-size:.82rem;
  letter-spacing:.07em;text-transform:uppercase;
  cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;
  transition:background var(--tf),opacity var(--tf),transform var(--tf);
}
.btn-submit:hover:not(:disabled){opacity:.9;transform:translateY(-1px)}
.btn-submit:active:not(:disabled){transform:scale(.98)}
.btn-submit:disabled{
  background:var(--s3);color:var(--tx3);
  cursor:not-allowed;transform:none;box-shadow:none;
}
.btn-submit.loading .btn-txt{opacity:.45}
.spinner{
  width:15px;height:15px;border-radius:50%;
  border:2px solid rgba(255,255,255,.3);border-top-color:#fff;
  animation:spin .7s linear infinite;display:none;flex-shrink:0;
}
@keyframes spin{to{transform:rotate(360deg)}}
.btn-submit.loading .spinner{display:block}

/* ── Switch ── */
.switch{text-align:center;margin-top:20px;font-size:.74rem;color:var(--tx3)}
.switch button{
  background:none;border:none;cursor:pointer;
  color:var(--acc);font-size:.74rem;font-family:var(--fs);font-weight:700;
  padding:0;transition:opacity var(--tf);
}
.switch button:hover{opacity:.7}

/* ── Step dots ── */
.step-dots{display:flex;align-items:center;justify-content:center;gap:6px;margin-bottom:22px}
.step-dot{width:6px;height:6px;border-radius:50%;background:var(--s3);transition:all .25s var(--ease)}
.step-dot.active{width:20px;border-radius:99px;background:var(--acc)}
.step-dot.done{background:var(--acc)}

/* ── Divider ── */
.divider{height:1px;background:var(--b);margin:28px 0}

/* ── Eco badges ── */
.eco-row{display:flex;align-items:center;justify-content:center;gap:8px}
.eco-badge{
  display:flex;align-items:center;gap:5px;padding:5px 12px;
  border:1.5px solid var(--b);border-radius:99px;
  font-size:.6rem;font-weight:600;color:var(--tx3);
}
.eco-badge svg{color:var(--acc)}

/* ── Status ── */
.status-bar{
  display:flex;align-items:center;justify-content:center;gap:7px;
  margin-top:32px;font-size:.62rem;color:var(--tx3);letter-spacing:.03em;
}
.status-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0;background:var(--b);transition:background .3s}
.status-dot.ok{background:var(--acc);animation:pulse 2.4s ease-in-out infinite}
.status-dot.err{background:var(--red)}
@keyframes pulse{
  0%,100%{box-shadow:0 0 0 0 rgba(26,158,74,.4)}
  50%{box-shadow:0 0 0 5px rgba(26,158,74,0)}
}
</style>
</head>
<body>

<div class="fb-bar" id="fb-bar"></div>

<div class="wrap" role="main">

  <!-- ═══ ФОРМА РЕГИСТРАЦИИ ═══ -->

<script type="module">
  import { auth, db } from './firebase.js';
  import {
    onAuthStateChanged,
    createUserWithEmailAndPassword,
    signInWithEmailAndPassword,
    updateProfile,
    setPersistence, browserLocalPersistence,
  } from 'https://www.gstatic.com/firebasejs/11.8.1/firebase-auth.js';
  import { doc, setDoc, serverTimestamp }
    from 'https://www.gstatic.com/firebasejs/11.8.1/firebase-firestore.js';

  const HOME         = 'home.html';
  const PHONE_DOMAIN = 'phone.dastdaroz.id';

  // ─────────────────────────────────────────────────────────────
  //  Rate Limiter
  //  Хранение: sessionStorage (переживает refresh, сбрасывается
  //  при закрытии вкладки). Без синхронизации между вкладками —
  //  достаточно для данного проекта.
  //
  //  Две защиты:
  //  1. Per-key  — по номеру телефона (брутфорс паролей)
  //  2. Global   — по сессии (перебор разных номеров)
  // ─────────────────────────────────────────────────────────────
  const RL = (() => {
    const SK          = 'rl_v1';           // sessionStorage key
    const MAX_FAILS   = 5;                 // попыток до блокировки
    const WIN_MS      = 15 * 60_000;       // скользящее окно 15 мин
    // прогрессивные паузы: 30с → 2м → 15м → 1ч
    const LOCKOUTS_MS = [30_000, 120_000, 900_000, 3_600_000];
    const G_MAX       = 30;                // глобально макс попыток
    const G_WIN_MS    = 10 * 60_000;       // за 10 мин

    const load = () => {
      try { return JSON.parse(sessionStorage.getItem(SK) || '{}'); }
      catch { return {}; }
    };
    const save = s => {
      try { sessionStorage.setItem(SK, JSON.stringify(s)); }
      catch {}
    };

    // Проверка: заблокирован ли ключ?
    function check(key) {
      const now = Date.now();
      const s   = load();
      const e   = s[key];
      if (!e) return { ok: true, fails: 0 };
      // Активная блокировка
      if (e.until && now < e.until) {
        return { ok: false, until: e.until };
      }
      // Окно истекло — сбрасываем
      if (!e.until && now - e.first > WIN_MS) {
        delete s[key]; save(s);
        return { ok: true, fails: 0 };
      }
      return { ok: true, fails: e.fails || 0 };
    }

    // Записать неудачную попытку, вернуть новое состояние
    function fail(key) {
      const now = Date.now();
      const s   = load();
      let e     = s[key];

      // Новая сессия или истёкшее окно
      if (!e || (!e.until && now - e.first > WIN_MS)) {
        e = { fails: 0, lockouts: 0, first: now };
      }
      // Прошлая блокировка уже истекла — обнуляем счётчик
      if (e.until && now >= e.until) {
        e.fails = 0;
        delete e.until;
        e.first = now;
      }

      e.fails = (e.fails || 0) + 1;

      if (e.fails >= MAX_FAILS) {
        const dur  = LOCKOUTS_MS[Math.min(e.lockouts, LOCKOUTS_MS.length - 1)];
        e.until    = now + dur;
        e.lockouts = (e.lockouts || 0) + 1;
        e.fails    = 0;
        e.first    = now;
      }

      s[key] = e;
      save(s);
      return check(key);
    }

    // Успешный вход — очищаем счётчик
    function success(key) {
      const s = load();
      delete s[key];
      save(s);
    }

    // Глобальный rate limit (все попытки в сессии)
    function checkGlobal() {
      const now = Date.now();
      const s   = load();
      const g   = s['__g'] || { t: [] };
      g.t = g.t.filter(x => now - x < G_WIN_MS);
      if (g.t.length >= G_MAX) {
        s['__g'] = g; save(s);
        return false;
      }
      g.t.push(now);
      s['__g'] = g;
      save(s);
      return true;
    }

    return { check, fail, success, checkGlobal, MAX_FAILS };
  })();

  // ─────────────────────────────────────────────────────────────
  //  Countdown — блокирует кнопку и показывает таймер
  // ─────────────────────────────────────────────────────────────
  let _cdTimer = null;

  function startLockout(until, btn) {
    if (_cdTimer) clearInterval(_cdTimer);
    setLoading(btn, false);
    btn.disabled = true;

    const tick = () => {
      const sec = Math.ceil((until - Date.now()) / 1000);
      if (sec <= 0) {
        clearInterval(_cdTimer);
        _cdTimer  = null;
        btn.disabled = false;
        hideAlert();
        return;
      }
      const m = Math.floor(sec / 60);
      const s = sec % 60;
      const t = m > 0 ? `${m}:${String(s).padStart(2, '0')}` : `${s} сон`;
      showAlert(
        'Дастрасӣ муваqqатан маҳдуд',
        `Хеле зиёд кӯшишҳои нодуруст. Такрор кӯшиш баъди: ${t}`
      );
    };

    tick();
    _cdTimer = setInterval(tick, 1000);
  }

  // ─────────────────────────────────────────────────────────────
  //  Helpers
  // ─────────────────────────────────────────────────────────────
  function digitsOnly(v)  { return (v || '').replace(/\D/g, ''); }

  function normalizePhone(raw) {
    let d = digitsOnly(raw);
    if (d.startsWith('992')) d = d.slice(3);
    else if (d.startsWith('8') && d.length === 10) d = d.slice(1);
    if (d.length !== 9) return null;
    return d;
  }

  function formatPhoneDisplay(d9) {
    return '+992 ' + d9.slice(0,2) + ' ' + d9.slice(2,5) + ' ' + d9.slice(5,7) + ' ' + d9.slice(7,9);
  }

  function phoneToPseudoEmail(d9) { return `992${d9}@${PHONE_DOMAIN}`; }

  function attachPhoneMask(input) {
    input.addEventListener('input', () => {
      let d = digitsOnly(input.value).slice(0, 9), out = '';
      if (d.length > 0) out  = d.slice(0,2);
      if (d.length > 2) out += ' ' + d.slice(2,5);
      if (d.length > 5) out += ' ' + d.slice(5,7);
      if (d.length > 7) out += ' ' + d.slice(7,9);
      input.value = out;
    });
  }

  // ─────────────────────────────────────────────────────────────
  //  DOM refs
  // ─────────────────────────────────────────────────────────────
  const fbBar      = document.getElementById('fb-bar');
  const alertEl    = document.getElementById('lock-alert');
  const alertTitle = document.getElementById('alert-title');
  const alertMsg   = document.getElementById('alert-msg');
  const statusDot  = document.getElementById('status-dot');
  const statusText = document.getElementById('status-text');
  const cardTitle  = document.getElementById('card-title');
  const cardSub    = document.getElementById('card-sub');

  const loginPhone   = document.getElementById('login-phone');
  const loginPass    = document.getElementById('login-pass');
  const btnLoginNext = document.getElementById('btn-login-next');
  const btnLogin     = document.getElementById('btn-login');
  const btnLoginBack = document.getElementById('btn-login-back');
  const loginStep1   = document.getElementById('login-step-1');
  const loginStep2   = document.getElementById('login-step-2');
  const ldot1        = document.getElementById('ldot-1');
  const ldot2        = document.getElementById('ldot-2');
  const phoneChipNum = document.getElementById('phone-chip-num');

  const regName  = document.getElementById('reg-name');
  const regPhone = document.getElementById('reg-phone');
  const regPass  = document.getElementById('reg-pass');
  const btnReg   = document.getElementById('btn-reg');

  attachPhoneMask(loginPhone);
  attachPhoneMask(regPhone);

  let loginPhoneDigits = null;

  // ─────────────────────────────────────────────────────────────
  //  Auth state
  // ─────────────────────────────────────────────────────────────
  fbBar.classList.add('loading');
  onAuthStateChanged(auth, user => {
    fbBar.classList.remove('loading');
    fbBar.classList.add('done');
    if (user) {
      statusDot.className    = 'status-dot ok';
      statusText.textContent = 'Шумо аллакай ворид шудед — гузариш…';
      setTimeout(() => { window.location.href = HOME; }, 500);
    } else {
      statusDot.className    = 'status-dot ok';
      statusText.textContent = 'dastdaroz ID пайваст аст';
    }
  });

  // ─────────────────────────────────────────────────────────────
  //  Tabs
  // ─────────────────────────────────────────────────────────────
  const tabLogin  = document.getElementById('tab-login');
  const tabReg    = document.getElementById('tab-reg');
  const formLogin = document.getElementById('form-login');
  const formReg   = document.getElementById('form-reg');

  function switchMode(mode) {
    const isLogin = mode === 'login';
    tabLogin.classList.toggle('active', isLogin);
    tabReg.classList.toggle('active', !isLogin);
    formLogin.style.display = isLogin ? '' : 'none';
    formReg.style.display   = isLogin ? 'none' : '';
    cardTitle.innerHTML = isLogin ? 'Хуш <em>омадед</em>' : 'Ҳисоб <em>кушоед</em>';
    cardSub.textContent = isLogin ? 'Бо рақами телефон ворид шавед' : 'Танҳо 3 қадам — тез ва осон';
    hideAlert();
    clearAllErrors();
    goLoginStep(1);
    if (_cdTimer) { clearInterval(_cdTimer); _cdTimer = null; btnLogin.disabled = false; }
  }
  tabLogin.addEventListener('click', () => switchMode('login'));
  tabReg.addEventListener('click',   () => switchMode('reg'));
  document.getElementById('go-reg').addEventListener('click',   () => switchMode('reg'));
  document.getElementById('go-login').addEventListener('click', () => switchMode('login'));

  // ─────────────────────────────────────────────────────────────
  //  Eye toggles / password strength
  // ─────────────────────────────────────────────────────────────
  function bindEye(btnId, inpId, showId, hideId) {
    const btn = document.getElementById(btnId);
    const inp = document.getElementById(inpId);
    btn.addEventListener('click', () => {
      const isPass = inp.type === 'password';
      inp.type = isPass ? 'text' : 'password';
      document.getElementById(showId).style.display = isPass ? 'none' : '';
      document.getElementById(hideId).style.display = isPass ? '' : 'none';
    });
  }
  bindEye('eye-login', 'login-pass', 'eye-login-show', 'eye-login-hide');
  bindEye('eye-reg',   'reg-pass',   'eye-reg-show',   'eye-reg-hide');

  const psBars = document.querySelectorAll('#ps-bars .ps-bar');
  const psLbl  = document.getElementById('ps-lbl');
  regPass.addEventListener('input', () => {
    const v = regPass.value;
    if (!v) { psBars.forEach(b => b.style.background = 'var(--s3)'); psLbl.style.display = 'none'; return; }
    let score = 0;
    if (v.length >= 6)  score++;
    if (v.length >= 10) score++;
    if (/[0-9]/.test(v) && /[a-zA-Zа-яА-Я]/.test(v)) score++;
    if (/[^a-zA-Zа-яА-Я0-9]/.test(v)) score++;
    const colors = ['var(--red)','var(--amber)','var(--acc2)','var(--acc)'];
    const labels = ['Заиф','Миёна','Хуб','Мустаҳкам'];
    psBars.forEach((b, i) => { b.style.background = i < score ? colors[Math.min(score,4)-1] : 'var(--s3)'; });
    psLbl.style.display = 'block';
    psLbl.textContent   = labels[Math.min(score,4)-1] || '';
    psLbl.style.color   = colors[Math.min(score,4)-1] || 'var(--tx3)';
  });

  // ─────────────────────────────────────────────────────────────
  //  Alert / field errors
  // ─────────────────────────────────────────────────────────────
  function showAlert(title, msg, type = 'err') {
    alertTitle.textContent = title;
    alertMsg.textContent   = ' ' + msg;
    alertEl.className = `alert ${type} show`;
  }
  function hideAlert() { alertEl.className = 'alert err'; }

  function showFieldErr(id, msg) {
    const inp = document.getElementById(id);
    const err = document.getElementById('err-' + id);
    if (inp) inp.classList.add('err');
    if (err) { err.textContent = msg; err.classList.add('show'); }
  }
  function clearFieldErr(id) {
    const inp = document.getElementById(id);
    const err = document.getElementById('err-' + id);
    if (inp) inp.classList.remove('err');
    if (err) { err.textContent = ''; err.classList.remove('show'); }
  }
  function clearAllErrors() {
    ['login-phone','login-pass','reg-name','reg-phone','reg-pass'].forEach(clearFieldErr);
    hideAlert();
  }
  [loginPhone, loginPass, regName, regPhone, regPass].forEach(inp => {
    inp.addEventListener('input', () => {
      if (_cdTimer) return; // не сбрасывать alert во время countdown
      clearFieldErr(inp.id);
      hideAlert();
    });
  });

  // ─────────────────────────────────────────────────────────────
  //  Step navigation
  // ─────────────────────────────────────────────────────────────
  function goLoginStep(n) {
    loginStep1.style.display = n === 1 ? '' : 'none';
    loginStep2.style.display = n === 2 ? '' : 'none';
    ldot1.classList.toggle('active', n === 1);
    ldot1.classList.toggle('done',   n === 2);
    ldot2.classList.toggle('active', n === 2);
    ldot2.classList.remove('done');
    if (n === 2) setTimeout(() => loginPass.focus(), 150);
    if (n === 1) setTimeout(() => loginPhone.focus(), 150);
  }

  btnLoginNext.addEventListener('click', () => {
    const d9 = normalizePhone(loginPhone.value);
    if (!d9) { showFieldErr('login-phone', 'Рақами дуруст ворид кунед (9 рақам)'); return; }
    loginPhoneDigits = d9;
    phoneChipNum.textContent = formatPhoneDisplay(d9);
    goLoginStep(2);

    // Восстановить lockout после refresh страницы
    const st = RL.check(phoneToPseudoEmail(d9));
    if (!st.ok) startLockout(st.until, btnLogin);
  });

  btnLoginBack.addEventListener('click', () => {
    if (_cdTimer) { clearInterval(_cdTimer); _cdTimer = null; btnLogin.disabled = false; }
    loginPass.value = '';
    hideAlert();
    goLoginStep(1);
  });
  loginPhone.addEventListener('keydown', e => { if (e.key === 'Enter') btnLoginNext.click(); });
  loginPass.addEventListener('keydown',  e => { if (e.key === 'Enter') btnLogin.click(); });

  // ─────────────────────────────────────────────────────────────
  //  Firebase error messages
  // ─────────────────────────────────────────────────────────────
  function fbErr(code) {
    const map = {
      'auth/user-not-found':            ['Ҳисоб ёфт нашуд',    'Бо ин рақами телефон ҳисоб вуҷуд надорад. Аввал сабти ном кунед.'],
      'auth/wrong-password':            ['Парол нодуруст',      'Парол хато аст. Бори дигар кӯшиш кунед.'],
      'auth/invalid-credential':        ['Маълумот нодуруст',   'Рақам ё парол нодуруст аст.'],
      'auth/invalid-login-credentials': ['Маълумот нодуруст',   'Рақам ё парол нодуруст аст.'],
      'auth/too-many-requests':         ['Firebase: маҳдудият', 'Хеле зиёд кӯшишҳо. Каме сабр кунед.'],
      'auth/email-already-in-use':      ['Рақам аллакай сабт',  'Бо ин рақами телефон ҳисоб аллакай вуҷуд дорад. Ворид шавед.'],
      'auth/weak-password':             ['Парол хеле сода',     'Парол бояд ҳадди ақал 6 аломат дошта бошад.'],
      'auth/network-request-failed':    ['Хатои шабака',        'Пайвастшавӣ ба интернетро санҷед.'],
    };
    return map[code] || ['Хатогӣ рӯй дод', 'Чизе нодуруст шуд. Бори дигар кӯшиш кунед.'];
  }

  function setLoading(btn, on) {
    btn.disabled = on;
    btn.classList.toggle('loading', on);
  }

  // ─────────────────────────────────────────────────────────────
  //  LOGIN
  // ─────────────────────────────────────────────────────────────
  const WRONG_PASS_CODES = new Set([
    'auth/wrong-password',
    'auth/invalid-credential',
    'auth/invalid-login-credentials',
  ]);

  btnLogin.addEventListener('click', async () => {
    const pass = loginPass.value;
    if (!pass) { showFieldErr('login-pass', 'Паролро ворид кунед'); return; }
    if (!loginPhoneDigits) { goLoginStep(1); return; }

    // 1. Глобальный rate limit
    if (!RL.checkGlobal()) {
      showAlert('Хеле зиёд кӯшишҳо', 'Каме сабр кунед ва бори дигар кӯшиш кунед.');
      return;
    }

    // 2. Per-phone rate limit
    const key     = phoneToPseudoEmail(loginPhoneDigits);
    const rlState = RL.check(key);
    if (!rlState.ok) { startLockout(rlState.until, btnLogin); return; }

    setLoading(btnLogin, true);
    try {
      await setPersistence(auth, browserLocalPersistence);
      await signInWithEmailAndPassword(auth, key, pass);
      RL.success(key);                         // сбросить счётчик при успехе
      statusText.textContent = 'Муваффақ! Гузариш…';
      window.location.href = HOME;
    } catch (e) {
      if (WRONG_PASS_CODES.has(e.code)) {
        // Записываем неудачу и проверяем lockout
        const res     = RL.fail(key);
        const [t, m]  = fbErr(e.code);
        if (!res.ok) {
          startLockout(res.until, btnLogin);   // заблокировать
        } else {
          const left = RL.MAX_FAILS - res.fails;
          const hint = left <= 2
            ? ` Боқимонда: ${left} кӯшиш.`
            : '';
          showAlert(t, m + hint);
          setLoading(btnLogin, false);
        }
      } else {
        // Сетевые ошибки, Firebase rate limit и т.д. — не считаем как брутфорс
        const [t, m] = fbErr(e.code);
        showAlert(t, m);
        setLoading(btnLogin, false);
      }
    }
  });

  // ─────────────────────────────────────────────────────────────
  //  REGISTER
  // ─────────────────────────────────────────────────────────────
  btnReg.addEventListener('click', async () => {
    clearAllErrors();
    const name = regName.value.trim();
    const d9   = normalizePhone(regPhone.value);
    const pass = regPass.value;
    let bad = false;
    if (name.length < 2) { showFieldErr('reg-name',  'Ном ва насабро ворид кунед'); bad = true; }
    if (!d9)              { showFieldErr('reg-phone', 'Рақами дуруст ворид кунед (9 рақам)'); bad = true; }
    if (pass.length < 6)  { showFieldErr('reg-pass',  'Ҳадди ақал 6 аломат лозим аст'); bad = true; }
    if (bad) return;

    if (!RL.checkGlobal()) {
      showAlert('Хеле зиёд кӯшишҳо', 'Каме сабр кунед ва бори дигар кӯшиш кунед.');
      return;
    }

    setLoading(btnReg, true);
    try {
      await setPersistence(auth, browserLocalPersistence);
      const email = phoneToPseudoEmail(d9);
      const cred  = await createUserWithEmailAndPassword(auth, email, pass);
      await updateProfile(cred.user, { displayName: name });
      await setDoc(doc(db, 'users', cred.user.uid), {
        uid: cred.user.uid, phone: '+992' + d9, email: '',
        displayName: name, role: 'client', address: '', avatarUrl: '',
        provider: 'phone',
        createdAt: serverTimestamp(), updatedAt: serverTimestamp(), lastLoginAt: serverTimestamp(),
      });
      statusText.textContent = 'Ҳисоб кушода шуд! Гузариш…';
      window.location.href = HOME;
    } catch (e) {
      const [t, m] = fbErr(e.code);
      showAlert(t, m);
      setLoading(btnReg, false);
    }
  });
</script>
</body>
</html>
