<!DOCTYPE html>
<html lang="tg">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0,viewport-fit=cover"/>
<meta name="mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<title>dastdaroz ID — Вуруд</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Nunito:wght@700;800;900&family=Inter:wght@300;400;500;600;700&display=swap"/>
<style>
:root{
  --bg:#f3f7f4;--s1:#ffffff;--s2:#edf4ef;--s3:#e0ede3;--s4:#c8dccb;
  --b0:rgba(0,0,0,.07);--b1:rgba(0,0,0,.11);--b2:rgba(0,0,0,.18);
  --acc:#1a9e4a;--acc2:#22c55e;--accd:rgba(26,158,74,.09);--accg:rgba(26,158,74,.22);
  --acc-shadow:rgba(26,158,74,.25);
  --red:#dc2626;--redd:rgba(220,38,38,.1);
  --amber:#d97706;--amberd:rgba(217,119,6,.1);
  --tx:#171f1a;--tx2:#3d5244;--tx3:#7a9882;
  --fd:'Nunito',sans-serif;--fs:'Inter',system-ui,sans-serif;
  --ease:cubic-bezier(.32,0,.18,1);--spring:cubic-bezier(.34,1.56,.64,1);
  --tf:.13s;
  --shadow:0 1px 3px rgba(0,0,0,.05),0 4px 14px rgba(0,0,0,.04);
  --shadow-md:0 4px 24px rgba(0,0,0,.09),0 1px 4px rgba(0,0,0,.04);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html{height:100%;-webkit-text-size-adjust:100%}
body{
  background:var(--bg);color:var(--tx);font-family:var(--fs);font-weight:400;
  min-height:100svh;-webkit-font-smoothing:antialiased;
  display:flex;align-items:center;justify-content:center;padding:24px 16px;
}
::selection{background:var(--acc);color:#fff}

body::before{
  content:'';position:fixed;inset:0;pointer-events:none;
  background-image:radial-gradient(circle,rgba(26,158,74,.06) 1px,transparent 1px);
  background-size:28px 28px;
}
body::after{
  content:'';position:fixed;inset:0;pointer-events:none;
  background:radial-gradient(ellipse 70% 60% at 50% 0%,rgba(26,158,74,.07) 0%,transparent 65%);
}

/* ── ПРОГРЕСС ── */
.fb-bar{position:fixed;top:0;left:0;right:0;height:3px;z-index:999;
  background:linear-gradient(90deg,var(--acc),var(--acc2));
  transform-origin:left;transform:scaleX(0);transition:transform .4s var(--ease)}
.fb-bar.loading{transform:scaleX(.6)}
.fb-bar.done{transform:scaleX(1);opacity:0;transition:transform .2s,opacity .3s ease .2s}

/* ── КАРТОЧКА ── */
.card{
  position:relative;z-index:1;
  width:min(420px,calc(100vw - 32px));
  background:var(--s1);border:1.5px solid var(--b0);border-radius:24px;
  box-shadow:var(--shadow-md);
  animation:fadeUp .35s var(--ease) both;
  overflow:hidden;
}
@keyframes fadeUp{from{opacity:0;transform:translateY(18px)}to{opacity:1;transform:translateY(0)}}

/* ── ШАПКА / БРЕНД dastdaroz ID ── */
.card-head{padding:28px 28px 0}
.idlogo{display:flex;align-items:center;gap:11px;margin-bottom:24px}
.idlogo-mark{
  width:40px;height:40px;border-radius:12px;flex-shrink:0;
  background:linear-gradient(135deg,var(--acc),var(--acc2));
  display:flex;align-items:center;justify-content:center;color:#fff;
  box-shadow:0 4px 12px var(--acc-shadow);position:relative;
}
.idlogo-mark svg{position:relative;z-index:1}
.idlogo-name{font-family:var(--fd);font-weight:900;font-size:1.02rem;color:var(--tx);line-height:1.15}
.idlogo-name span{color:var(--acc)}
.idlogo-sub{font-size:.6rem;color:var(--tx3);font-weight:600;margin-top:2px;letter-spacing:.02em}

.card-title{font-family:var(--fd);font-weight:900;font-size:1.5rem;color:var(--tx);letter-spacing:-.02em;line-height:1.15;margin-bottom:5px}
.card-title em{color:var(--acc);font-style:normal}
.card-sub{font-size:.76rem;color:var(--tx3);margin-bottom:20px;line-height:1.5}

/* ── ТАБЫ ── */
.tabs{display:grid;grid-template-columns:1fr 1fr;gap:4px;
  background:var(--s2);border-radius:13px;padding:4px;margin-bottom:0}
.tab{padding:9px;text-align:center;cursor:pointer;border:none;background:none;
  font-family:var(--fs);font-size:.72rem;font-weight:600;color:var(--tx3);
  border-radius:10px;transition:all var(--tf)}
.tab.active{background:var(--s1);color:var(--acc);box-shadow:0 1px 4px rgba(0,0,0,.08);font-weight:700}
.tab:hover:not(.active){color:var(--tx2)}

/* ── ТЕЛО ── */
.card-body{padding:22px 28px 28px}

/* ── АЛЕРТ ── */
.alert{display:none;align-items:flex-start;gap:9px;padding:11px 13px;margin-bottom:14px;
  border-radius:12px;font-size:.73rem;color:var(--tx2);line-height:1.5;border:1.5px solid}
.alert.show{display:flex}
.alert.err{background:rgba(220,38,38,.06);border-color:rgba(220,38,38,.2)}
.alert.ok{background:rgba(26,158,74,.07);border-color:var(--accg)}
.alert strong{display:block;font-size:.7rem;font-weight:700;margin-bottom:2px}
.alert.err strong{color:var(--red)}
.alert.ok  strong{color:var(--acc)}

/* ── ПОЛЕ ── */
.field{position:relative;margin-bottom:12px}
.lbl{font-size:.5rem;letter-spacing:.18em;text-transform:uppercase;color:var(--tx3);
  display:block;margin-bottom:5px;font-weight:600}
.inp{
  width:100%;background:var(--s2);border:1.5px solid var(--b0);border-radius:11px;
  color:var(--tx);font-family:var(--fs);font-size:.85rem;font-weight:400;
  padding:11px 14px;outline:none;transition:border-color var(--tf),box-shadow var(--tf);
}
.inp:focus{border-color:var(--acc);box-shadow:0 0 0 3px var(--accd)}
.inp.has-eye{padding-right:44px}
.inp.err{border-color:rgba(220,38,38,.5);animation:shake .32s ease}
.inp::placeholder{color:var(--tx3)}
@keyframes shake{0%,100%{transform:translateX(0)}20%,60%{transform:translateX(-5px)}40%,80%{transform:translateX(5px)}}
.field-err{font-size:.62rem;color:var(--red);margin-top:4px;display:none}
.field-err.show{display:block}

/* ── ПОЛЕ ТЕЛЕФОНА (+992 префикс) ── */
.phone-field{
  display:flex;align-items:stretch;background:var(--s2);border:1.5px solid var(--b0);
  border-radius:11px;overflow:hidden;transition:border-color var(--tf),box-shadow var(--tf);
}
.phone-field:focus-within{border-color:var(--acc);box-shadow:0 0 0 3px var(--accd)}
.phone-prefix{
  display:flex;align-items:center;gap:6px;padding:0 12px;
  background:var(--s3);border-right:1.5px solid var(--b0);
  font-family:var(--fs);font-weight:700;font-size:.85rem;color:var(--tx2);
  flex-shrink:0;user-select:none;
}
.phone-flag{width:16px;height:12px;border-radius:2px;overflow:hidden;flex-shrink:0;box-shadow:0 0 0 1px rgba(0,0,0,.08)}
.phone-input{
  flex:1;min-width:0;border:none;background:none;outline:none;
  color:var(--tx);font-family:var(--fs);font-size:.85rem;font-weight:500;
  padding:11px 14px 11px 10px;letter-spacing:.02em;
}
.phone-input::placeholder{color:var(--tx3);letter-spacing:.02em}

/* ── ГЛАЗ ── */
.eye{position:absolute;right:0;bottom:0;width:42px;height:42px;
  background:none;border:none;cursor:pointer;color:var(--tx3);
  display:flex;align-items:center;justify-content:center;transition:color var(--tf)}
.eye:hover{color:var(--tx2)}

/* ── СИЛА ПАРОЛЯ ── */
.ps-bars{display:flex;gap:4px;margin-top:7px}
.ps-bar{flex:1;height:3px;border-radius:2px;background:var(--s3);transition:background .3s}
.ps-lbl{font-size:.58rem;color:var(--tx3);margin-top:4px;display:none}

/* ── ШАГ 2 ВХОДА: подтверждённый номер (chip) ── */
.phone-chip{
  display:flex;align-items:center;gap:10px;
  background:var(--accd);border:1.5px solid var(--accg);border-radius:12px;
  padding:11px 13px;margin-bottom:16px;
}
.phone-chip-ico{
  width:30px;height:30px;border-radius:9px;flex-shrink:0;
  background:var(--s1);display:flex;align-items:center;justify-content:center;color:var(--acc);
}
.phone-chip-num{flex:1;font-family:var(--fs);font-weight:700;font-size:.84rem;color:var(--tx);letter-spacing:.02em}
.phone-chip-edit{
  background:none;border:none;cursor:pointer;color:var(--acc);
  font-size:.68rem;font-weight:700;font-family:var(--fs);padding:4px 6px;
  display:flex;align-items:center;gap:4px;transition:opacity var(--tf);
}
.phone-chip-edit:hover{opacity:.7}

/* ── СТРОКА ОПЦИЙ ── */
.opt-row{display:flex;align-items:center;justify-content:flex-end;margin-bottom:14px;gap:8px}
.forgot{font-size:.68rem;color:var(--tx3);background:none;border:none;cursor:pointer;padding:0;
  font-family:var(--fs);transition:color var(--tf);text-decoration:none}
.forgot:hover{color:var(--acc)}

/* ── ТЕРМИНЫ ── */
.terms{font-size:.67rem;color:var(--tx3);margin-bottom:14px;line-height:1.6}
.terms a{color:var(--acc);text-decoration:none}
.terms a:hover{text-decoration:underline}

/* ── КНОПКА САБМИТ ── */
.btn-submit{
  width:100%;padding:13px;
  background:linear-gradient(135deg,var(--acc),var(--acc2));border:none;border-radius:12px;
  color:#fff;font-family:var(--fd);font-weight:900;font-size:.78rem;letter-spacing:.06em;text-transform:uppercase;
  cursor:pointer;display:flex;align-items:center;justify-content:center;gap:9px;
  box-shadow:0 4px 16px var(--acc-shadow);transition:opacity var(--tf),transform var(--tf);
  position:relative;overflow:hidden;
}
.btn-submit:hover:not(:disabled){opacity:.9;transform:translateY(-1px);box-shadow:0 6px 20px var(--acc-shadow)}
.btn-submit:active{transform:scale(.98)}
.btn-submit:disabled{opacity:.45;cursor:not-allowed;transform:none;box-shadow:none}
.btn-submit.loading .btn-txt{opacity:.5}
.spinner{width:14px;height:14px;border-radius:50%;border:2px solid rgba(255,255,255,.3);
  border-top-color:#fff;animation:spin .7s linear infinite;display:none;flex-shrink:0}
@keyframes spin{to{transform:rotate(360deg)}}
.btn-submit.loading .spinner{display:block}

.btn-back-step{
  width:100%;padding:11px;margin-top:9px;
  background:none;border:none;color:var(--tx3);
  font-family:var(--fs);font-size:.72rem;font-weight:600;
  cursor:pointer;display:flex;align-items:center;justify-content:center;gap:6px;
  transition:color var(--tf);
}
.btn-back-step:hover{color:var(--tx2)}

/* ── ПЕРЕКЛЮЧАТЕЛЬ ── */
.switch{text-align:center;margin-top:16px;font-size:.72rem;color:var(--tx3)}
.switch button{background:none;border:none;cursor:pointer;color:var(--acc);
  font-size:.72rem;font-family:var(--fs);font-weight:700;padding:0;transition:opacity var(--tf)}
.switch button:hover{opacity:.75}

/* ── СТАТУС ── */
.status{margin-top:18px;display:flex;align-items:center;gap:7px;
  font-size:.6rem;color:var(--tx3);letter-spacing:.04em;
  padding:10px 13px;background:var(--s2);border-radius:10px}
.status-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0;background:var(--s4);transition:background .3s}
.status-dot.ok{background:var(--acc);animation:lp 2.4s ease-in-out infinite}
.status-dot.err{background:var(--red)}
@keyframes lp{0%,100%{box-shadow:0 0 0 0 rgba(26,158,74,.35)}50%{box-shadow:0 0 0 5px rgba(26,158,74,0)}}

/* ── Индикатор шагов (для входа) ── */
.step-dots{display:flex;align-items:center;justify-content:center;gap:6px;margin-bottom:18px}
.step-dot{width:6px;height:6px;border-radius:50%;background:var(--s3);transition:all .25s var(--ease)}
.step-dot.active{width:18px;border-radius:99px;background:var(--acc)}
.step-dot.done{background:var(--acc)}

/* ── Экосистемные бейджи (client + courier) ── */
.eco-row{display:flex;align-items:center;justify-content:center;gap:8px;margin-top:16px}
.eco-badge{
  display:flex;align-items:center;gap:5px;padding:5px 11px;
  background:var(--s2);border:1px solid var(--b0);border-radius:99px;
  font-size:.6rem;font-weight:600;color:var(--tx3);
}
.eco-badge svg{color:var(--acc);flex-shrink:0}

@media(max-width:480px){
  .card-head{padding:22px 20px 0}
  .card-body{padding:18px 20px 24px}
  .card-title{font-size:1.32rem}
}
</style>
</head>
<body>

<div class="fb-bar" id="fb-bar"></div>

<div class="card" role="main">

  <!-- ШАПКА / БРЕНД -->
  <div class="card-head">
    <div class="idlogo">
      <div class="idlogo-mark">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2">
          <path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/>
          <circle cx="12" cy="7" r="4"/>
        </svg>
      </div>
      <div>
        <div class="idlogo-name">dastdaroz <span>ID</span></div>
        <div class="idlogo-sub">Як ҳисоб барои тамоми хидматҳо</div>
      </div>
    </div>

    <div class="card-title" id="card-title">Хуш <em>омадед</em></div>
    <div class="card-sub" id="card-sub">Бо рақами телефон ворид шавед</div>

    <div class="tabs">
      <button class="tab active" id="tab-login" type="button">Вуруд</button>
      <button class="tab"        id="tab-reg"   type="button">Ҳисоб кушодан</button>
    </div>
  </div>

  <!-- ТЕЛО -->
  <div class="card-body">

    <!-- Алерт -->
    <div class="alert err" id="lock-alert" role="alert">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="flex-shrink:0;margin-top:1px">
        <circle cx="12" cy="12" r="10"/><path d="M12 8v4M12 16v.01" stroke-linecap="round"/>
      </svg>
      <div><strong id="alert-title"></strong><span id="alert-msg"></span></div>
    </div>

    <!-- ═══════════ ФОРМА ВХОДА (2 шага) ═══════════ -->
    <div id="form-login">

      <div class="step-dots">
        <div class="step-dot active" id="ldot-1"></div>
        <div class="step-dot" id="ldot-2"></div>
      </div>

      <!-- Шаг 1: номер телефона -->
      <div id="login-step-1">
        <div class="field">
          <label class="lbl" for="login-phone">Рақами телефон</label>
          <div class="phone-field">
            <div class="phone-prefix">
              <span class="phone-flag">
                <svg width="16" height="12" viewBox="0 0 16 12"><rect width="16" height="4" fill="#cc0000"/><rect y="4" width="16" height="4" fill="#ffffff"/><rect y="8" width="16" height="4" fill="#006600"/><circle cx="8" cy="6" r="1.6" fill="#f8b800"/></svg>
              </span>
              +992
            </div>
            <input type="tel" id="login-phone" class="phone-input"
              placeholder="90 000 00 00" autocomplete="tel" autofocus inputmode="numeric" maxlength="12"/>
          </div>
          <div class="field-err" id="err-login-phone"></div>
        </div>

        <button class="btn-submit" id="btn-login-next" type="button" style="margin-top:6px">
          <div class="spinner"></div>
          <span class="btn-txt">Давом додан</span>
        </button>
      </div>

      <!-- Шаг 2: пароль -->
      <div id="login-step-2" style="display:none">
        <div class="phone-chip">
          <div class="phone-chip-ico">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><path d="M22 16.92v3a2 2 0 01-2.18 2 19.79 19.79 0 01-8.63-3.07 19.5 19.5 0 01-6-6 19.79 19.79 0 01-3.07-8.67A2 2 0 014.11 2h3a2 2 0 012 1.72c.127.96.362 1.903.7 2.81a2 2 0 01-.45 2.11L8.09 9.91a16 16 0 006 6l1.27-1.27a2 2 0 012.11-.45c.907.338 1.85.573 2.81.7A2 2 0 0122 16.92z"/></svg>
          </div>
          <div class="phone-chip-num" id="phone-chip-num">+992 —</div>
          <button class="phone-chip-edit" type="button" id="btn-login-back">
            <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4"><path d="M11 4H4a2 2 0 00-2 2v14a2 2 0 002 2h14a2 2 0 002-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 013 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
            Тағйир
          </button>
        </div>

        <div class="field">
          <label class="lbl" for="login-pass">Парол</label>
          <input type="password" id="login-pass" class="inp has-eye"
            placeholder="••••••••" autocomplete="current-password"/>
          <button class="eye" id="eye-login" type="button" aria-label="Нишон додан">
            <svg id="eye-login-show" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
            <svg id="eye-login-hide" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" style="display:none"><path d="M17.94 17.94A10.07 10.07 0 0112 20c-7 0-11-8-11-8a18.45 18.45 0 015.06-5.94M9.9 4.24A9.12 9.12 0 0112 4c7 0 11 8 11 8a18.5 18.5 0 01-2.16 3.19m-6.72-1.07a3 3 0 11-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/></svg>
          </button>
          <div class="field-err" id="err-login-pass"></div>
        </div>

        <div class="opt-row">
          <a class="forgot" id="link-forgot" href="https://t.me/dastdaroz_support" target="_blank" rel="noopener">Паролро фаромӯш кардед?</a>
        </div>

        <button class="btn-submit" id="btn-login" type="button">
          <div class="spinner"></div>
          <span class="btn-txt">Ворид шудан</span>
        </button>
      </div>

      <div class="switch">Ҳисоб надоред? <button type="button" id="go-reg">Кушоед</button></div>
    </div>

    <!-- ═══════════ ФОРМА РЕГИСТРАЦИИ ═══════════ -->
    <div id="form-reg" style="display:none">

      <div class="field">
        <label class="lbl" for="reg-name">Ном ва насаб</label>
        <input type="text" id="reg-name" class="inp"
          placeholder="Аҳмад Ваҳидов" autocomplete="name"/>
        <div class="field-err" id="err-reg-name"></div>
      </div>

      <div class="field">
        <label class="lbl" for="reg-phone">Рақами телефон</label>
        <div class="phone-field">
          <div class="phone-prefix">
            <span class="phone-flag">
              <svg width="16" height="12" viewBox="0 0 16 12"><rect width="16" height="4" fill="#cc0000"/><rect y="4" width="16" height="4" fill="#ffffff"/><rect y="8" width="16" height="4" fill="#006600"/><circle cx="8" cy="6" r="1.6" fill="#f8b800"/></svg>
            </span>
            +992
          </div>
          <input type="tel" id="reg-phone" class="phone-input"
            placeholder="90 000 00 00" autocomplete="tel" inputmode="numeric" maxlength="12"/>
        </div>
        <div class="field-err" id="err-reg-phone"></div>
      </div>

      <div class="field">
        <label class="lbl" for="reg-pass">Парол</label>
        <input type="password" id="reg-pass" class="inp has-eye"
          placeholder="Ҳадди ақал 6 аломат" autocomplete="new-password"/>
        <button class="eye" id="eye-reg" type="button" aria-label="Нишон додан">
          <svg id="eye-reg-show" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
          <svg id="eye-reg-hide" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" style="display:none"><path d="M17.94 17.94A10.07 10.07 0 0112 20c-7 0-11-8-11-8a18.45 18.45 0 015.06-5.94M9.9 4.24A9.12 9.12 0 0112 4c7 0 11 8 11 8a18.5 18.5 0 01-2.16 3.19m-6.72-1.07a3 3 0 11-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/></svg>
        </button>
        <div class="ps-bars" id="ps-bars">
          <div class="ps-bar"></div><div class="ps-bar"></div><div class="ps-bar"></div><div class="ps-bar"></div>
        </div>
        <div class="ps-lbl" id="ps-lbl"></div>
        <div class="field-err" id="err-reg-pass"></div>
      </div>

      <div class="terms">Бо кушодани ҳисоб, шумо бо <a href="#" target="_blank">Шартҳои истифода</a> ва <a href="#" target="_blank">Сиёсати махфият</a>-и dastdaroz розӣ мешавед.</div>

      <button class="btn-submit" id="btn-reg" type="button">
        <div class="spinner"></div>
        <span class="btn-txt">Ҳисоб кушодан</span>
      </button>

      <div class="switch">Ҳисоб доред? <button type="button" id="go-login">Ворид шавед</button></div>
    </div>

    <!-- Экосистема -->
    <div class="eco-row">
      <div class="eco-badge">
        <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 2L3 6v14a2 2 0 002 2h14a2 2 0 002-2V6l-3-4z"/><line x1="3" y1="6" x2="21" y2="6"/><path d="M16 10a4 4 0 01-8 0"/></svg>
        Фармоиш
      </div>
      <div class="eco-badge">
        <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M5 17H3a2 2 0 01-2-2V5a2 2 0 012-2h11a2 2 0 012 2v3"/><rect x="9" y="11" width="14" height="10" rx="1"/><circle cx="12" cy="21" r="1"/><circle cx="20" cy="21" r="1"/></svg>
        Расониш
      </div>
    </div>

    <!-- Статус -->
    <div class="status">
      <span class="status-dot" id="status-dot"></span>
      <span id="status-text">Пайваст шудан ба dastdaroz…</span>
    </div>

  </div>
</div>

<script type="module">
  import { auth, db } from './firebase.js';
  import {
    onAuthStateChanged,
    createUserWithEmailAndPassword,
    signInWithEmailAndPassword,
    updateProfile,
    setPersistence, browserLocalPersistence,
  } from 'https://www.gstatic.com/firebasejs/11.8.1/firebase-auth.js';
  import { doc, getDoc, setDoc, serverTimestamp }
    from 'https://www.gstatic.com/firebasejs/11.8.1/firebase-firestore.js';

  const HOME = 'home.html';

  // ── Псевдо-домен для перетворення телефону в email Firebase Auth ──
  // Firebase Auth використовує email/password під капотом; реального
  // email не існує — це чиста імітація "вхід за номером телефону".
  const PHONE_DOMAIN = 'phone.dastdaroz.id';

  function digitsOnly(v) { return (v || '').replace(/\D/g, ''); }

  // Приймає будь-який ввід (з чи без +992/8) → повертає рівно 9 цифр або null
  function normalizePhone(raw) {
    let d = digitsOnly(raw);
    if (d.startsWith('992')) d = d.slice(3);
    else if (d.startsWith('8') && d.length === 10) d = d.slice(1);
    if (d.length !== 9) return null;
    return d;
  }

  function formatPhoneDisplay(d9) {
    return '+992 ' + d9.slice(0,2) + ' ' + d9.slice(2,5) + ' ' + d9.slice(5,7) + ' ' + d9.slice(7,9);
  }

  function phoneToPseudoEmail(d9) {
    return `992${d9}@${PHONE_DOMAIN}`;
  }

  // Автоформатирование поля при вводе: "90 000 00 00"
  function attachPhoneMask(input) {
    input.addEventListener('input', () => {
      let d = digitsOnly(input.value).slice(0, 9);
      let out = '';
      if (d.length > 0) out += d.slice(0,2);
      if (d.length > 2) out += ' ' + d.slice(2,5);
      if (d.length > 5) out += ' ' + d.slice(5,7);
      if (d.length > 7) out += ' ' + d.slice(7,9);
      input.value = out;
    });
  }

  const fbBar      = document.getElementById('fb-bar');
  const alertEl    = document.getElementById('lock-alert');
  const alertTitle = document.getElementById('alert-title');
  const alertMsg   = document.getElementById('alert-msg');
  const statusDot  = document.getElementById('status-dot');
  const statusText = document.getElementById('status-text');
  const cardTitle  = document.getElementById('card-title');
  const cardSub    = document.getElementById('card-sub');

  const loginPhone  = document.getElementById('login-phone');
  const loginPass   = document.getElementById('login-pass');
  const btnLoginNext= document.getElementById('btn-login-next');
  const btnLogin    = document.getElementById('btn-login');
  const btnLoginBack= document.getElementById('btn-login-back');
  const loginStep1  = document.getElementById('login-step-1');
  const loginStep2  = document.getElementById('login-step-2');
  const ldot1       = document.getElementById('ldot-1');
  const ldot2       = document.getElementById('ldot-2');
  const phoneChipNum= document.getElementById('phone-chip-num');

  const regName  = document.getElementById('reg-name');
  const regPhone = document.getElementById('reg-phone');
  const regPass  = document.getElementById('reg-pass');
  const btnReg   = document.getElementById('btn-reg');

  attachPhoneMask(loginPhone);
  attachPhoneMask(regPhone);

  let loginPhoneDigits = null; // 9 цифр, подтверждённых на шаге 1

  // ── Auth state: если уже вошли — сразу на главную ───────────
  fbBar.classList.add('loading');
  onAuthStateChanged(auth, async user => {
    fbBar.classList.remove('loading');
    fbBar.classList.add('done');
    if (user) {
      statusDot.className    = 'status-dot ok';
      statusText.textContent = 'Шумо аллакай ворид шудед — гузариш…';
      setTimeout(() => { window.location.href = HOME; }, 500);
    } else {
      statusDot.className    = 'status-dot ok';
      statusText.textContent = 'dastdaroz ID пайваст аст';
    }
  });

  // ── Переключение вкладок ─────────────────────────────────────
  const tabLogin  = document.getElementById('tab-login');
  const tabReg    = document.getElementById('tab-reg');
  const formLogin = document.getElementById('form-login');
  const formReg   = document.getElementById('form-reg');

  function switchMode(mode) {
    const isLogin = mode === 'login';
    tabLogin.classList.toggle('active', isLogin);
    tabReg.classList.toggle('active', !isLogin);
    formLogin.style.display = isLogin ? '' : 'none';
    formReg.style.display   = isLogin ? 'none' : '';
    cardTitle.innerHTML = isLogin ? 'Хуш <em>омадед</em>' : 'Ҳисоб <em>кушоед</em>';
    cardSub.textContent = isLogin ? 'Бо рақами телефон ворид шавед' : 'Танҳо 3 қадам — тез ва осон';
    hideAlert();
    clearAllErrors();
    goLoginStep(1);
  }
  tabLogin.addEventListener('click', () => switchMode('login'));
  tabReg.addEventListener('click',   () => switchMode('reg'));
  document.getElementById('go-reg').addEventListener('click',   () => switchMode('reg'));
  document.getElementById('go-login').addEventListener('click', () => switchMode('login'));

  // ── Показ/скрытие пароля ─────────────────────────────────────
  function bindEye(btnId, inpId, showId, hideId) {
    const btn = document.getElementById(btnId);
    const inp = document.getElementById(inpId);
    const s   = document.getElementById(showId);
    const h   = document.getElementById(hideId);
    btn.addEventListener('click', () => {
      const isPass = inp.type === 'password';
      inp.type = isPass ? 'text' : 'password';
      s.style.display = isPass ? 'none' : '';
      h.style.display = isPass ? '' : 'none';
    });
  }
  bindEye('eye-login', 'login-pass', 'eye-login-show', 'eye-login-hide');
  bindEye('eye-reg',   'reg-pass',   'eye-reg-show',   'eye-reg-hide');

  // ── Сила пароля (для регистрации) ────────────────────────────
  const psBars = document.querySelectorAll('#ps-bars .ps-bar');
  const psLbl  = document.getElementById('ps-lbl');
  regPass.addEventListener('input', () => {
    const v = regPass.value;
    if (!v) { psBars.forEach(b => b.style.background = 'var(--s3)'); psLbl.style.display = 'none'; return; }
    let score = 0;
    if (v.length >= 6) score++;
    if (v.length >= 10) score++;
    if (/[0-9]/.test(v) && /[a-zA-Zа-яА-Я]/.test(v)) score++;
    if (/[^a-zA-Zа-яА-Я0-9]/.test(v)) score++;
    const colors = ['var(--red)', 'var(--amber)', 'var(--acc2)', 'var(--acc)'];
    const labels = ['Заиф', 'Миёна', 'Хуб', 'Мустаҳкам'];
    psBars.forEach((b, i) => { b.style.background = i < score ? colors[Math.min(score,4)-1] : 'var(--s3)'; });
    psLbl.style.display = 'block';
    psLbl.textContent = labels[Math.min(score,4)-1] || '';
    psLbl.style.color = colors[Math.min(score,4)-1] || 'var(--tx3)';
  });

  // ── Алерты / ошибки полей ────────────────────────────────────
  function showAlert(title, msg) {
    alertTitle.textContent = title; alertMsg.textContent = ' ' + msg;
    alertEl.className = 'alert err show';
  }
  function hideAlert() { alertEl.className = 'alert err'; }
  function showFieldErr(id, msg) {
    const inp = document.getElementById(id);
    const err = document.getElementById('err-' + id);
    if (inp) inp.classList.add('err');
    if (err) { err.textContent = msg; err.classList.add('show'); }
  }
  function clearFieldErr(id) {
    const inp = document.getElementById(id);
    const err = document.getElementById('err-' + id);
    if (inp) inp.classList.remove('err');
    if (err) { err.textContent = ''; err.classList.remove('show'); }
  }
  function clearAllErrors() {
    ['login-phone','login-pass','reg-name','reg-phone','reg-pass'].forEach(clearFieldErr);
    hideAlert();
  }
  [loginPhone, loginPass, regName, regPhone, regPass].forEach(inp => {
    inp.addEventListener('input', () => { clearFieldErr(inp.id); hideAlert(); });
  });

  // ── Шаги входа ────────────────────────────────────────────────
  function goLoginStep(n) {
    loginStep1.style.display = n === 1 ? '' : 'none';
    loginStep2.style.display = n === 2 ? '' : 'none';
    ldot1.classList.toggle('active', n === 1);
    ldot1.classList.toggle('done', n === 2);
    ldot2.classList.toggle('active', n === 2);
    ldot2.classList.remove('done');
    if (n === 2) setTimeout(() => loginPass.focus(), 150);
    if (n === 1) setTimeout(() => loginPhone.focus(), 150);
  }

  btnLoginNext.addEventListener('click', () => {
    const d9 = normalizePhone(loginPhone.value);
    if (!d9) { showFieldErr('login-phone', 'Рақами дуруст ворид кунед (9 рақам)'); return; }
    loginPhoneDigits = d9;
    phoneChipNum.textContent = formatPhoneDisplay(d9);
    goLoginStep(2);
  });
  btnLoginBack.addEventListener('click', () => { loginPass.value = ''; goLoginStep(1); });
  loginPhone.addEventListener('keydown', e => { if (e.key === 'Enter') btnLoginNext.click(); });
  loginPass.addEventListener('keydown',  e => { if (e.key === 'Enter') btnLogin.click(); });

  // ── Карта помилок Firebase → людяний текст ───────────────────
  function fbErr(code) {
    const map = {
      'auth/user-not-found':        ['Ҳисоб ёфт нашуд', 'Бо ин рақами телефон ҳисоб вуҷуд надорад. Аввал сабти ном кунед.'],
      'auth/wrong-password':        ['Парол нодуруст', 'Парол хато аст. Бори дигар кӯшиш кунед.'],
      'auth/invalid-credential':    ['Маълумот нодуруст', 'Рақам ё парол нодуруст аст.'],
      'auth/invalid-login-credentials': ['Маълумот нодуруст', 'Рақам ё парол нодуруст аст.'],
      'auth/too-many-requests':     ['Хеле кӯшишҳо', 'Каме сабр кунед ва бори дигар кӯшиш кунед.'],
      'auth/email-already-in-use':  ['Рақам аллакай сабт аст', 'Бо ин рақами телефон ҳисоб аллакай вуҷуд дорад. Ворид шавед.'],
      'auth/weak-password':         ['Парол хеле сода', 'Парол бояд ҳадди ақал 6 аломат дошта бошад.'],
      'auth/network-request-failed':['Хатои шабака', 'Пайвастшавӣ ба интернетро санҷед.'],
    };
    return map[code] || ['Хатогӣ рӯй дод', 'Чизе нодуруст шуд. Бори дигар кӯшиш кунед.'];
  }

  function setLoading(btn, on) {
    btn.disabled = on;
    btn.classList.toggle('loading', on);
  }

  // ── Вхід ──────────────────────────────────────────────────────
  btnLogin.addEventListener('click', async () => {
    const pass = loginPass.value;
    if (!pass) { showFieldErr('login-pass', 'Паролро ворид кунед'); return; }
    if (!loginPhoneDigits) { goLoginStep(1); return; }

    setLoading(btnLogin, true);
    try {
      await setPersistence(auth, browserLocalPersistence);
      const email = phoneToPseudoEmail(loginPhoneDigits);
      await signInWithEmailAndPassword(auth, email, pass);
      statusText.textContent = 'Муваффақ! Гузариш…';
      window.location.href = HOME;
    } catch (e) {
      const [t, m] = fbErr(e.code);
      showAlert(t, m);
      setLoading(btnLogin, false);
    }
  });

  // ── Реєстрація ───────────────────────────────────────────────
  btnReg.addEventListener('click', async () => {
    clearAllErrors();
    const name = regName.value.trim();
    const d9   = normalizePhone(regPhone.value);
    const pass = regPass.value;
    let bad = false;

    if (name.length < 2) { showFieldErr('reg-name', 'Ном ва насабро ворид кунед'); bad = true; }
    if (!d9) { showFieldErr('reg-phone', 'Рақами дуруст ворид кунед (9 рақам)'); bad = true; }
    if (pass.length < 6) { showFieldErr('reg-pass', 'Ҳадди ақал 6 аломат лозим аст'); bad = true; }
    if (bad) return;

    setLoading(btnReg, true);
    try {
      await setPersistence(auth, browserLocalPersistence);
      const email = phoneToPseudoEmail(d9);
      const cred  = await createUserWithEmailAndPassword(auth, email, pass);
      await updateProfile(cred.user, { displayName: name });

      await setDoc(doc(db, 'users', cred.user.uid), {
        uid: cred.user.uid,
        phone: '+992' + d9,
        email: '',
        displayName: name,
        role: 'client',
        address: '', avatarUrl: '',
        provider: 'phone',
        createdAt: serverTimestamp(),
        updatedAt: serverTimestamp(),
        lastLoginAt: serverTimestamp(),
      });

      statusText.textContent = 'Ҳисоб кушода шуд! Гузариш…';
      window.location.href = HOME;
    } catch (e) {
      const [t, m] = fbErr(e.code);
      showAlert(t, m);
      setLoading(btnReg, false);
    }
  });
</script>
</body>
</html>
