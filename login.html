<!DOCTYPE html>
<html lang="tg">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0,viewport-fit=cover"/>
<meta name="mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<title>Вход | Galelium Delivery</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Nunito:wght@700;800;900&family=Inter:wght@300;400;500;600;700&display=swap"/>
<style>
:root{
  --bg:#f3f7f4;--s1:#ffffff;--s2:#edf4ef;--s3:#e0ede3;--s4:#c8dccb;
  --b0:rgba(0,0,0,.07);--b1:rgba(0,0,0,.11);--b2:rgba(0,0,0,.18);
  --acc:#1a9e4a;--acc2:#22c55e;--accd:rgba(26,158,74,.09);--accg:rgba(26,158,74,.22);
  --acc-shadow:rgba(26,158,74,.25);
  --red:#dc2626;--redd:rgba(220,38,38,.1);
  --tx:#171f1a;--tx2:#3d5244;--tx3:#7a9882;
  --fd:'Nunito',sans-serif;--fs:'Inter',system-ui,sans-serif;
  --ease:cubic-bezier(.32,0,.18,1);--spring:cubic-bezier(.34,1.56,.64,1);
  --tf:.13s;
  --shadow:0 1px 3px rgba(0,0,0,.05),0 4px 14px rgba(0,0,0,.04);
  --shadow-md:0 4px 24px rgba(0,0,0,.09),0 1px 4px rgba(0,0,0,.04);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html{height:100%;-webkit-text-size-adjust:100%}
body{
  background:var(--bg);color:var(--tx);font-family:var(--fs);font-weight:400;
  min-height:100svh;-webkit-font-smoothing:antialiased;
  display:flex;align-items:center;justify-content:center;padding:24px 16px;
}
::selection{background:var(--acc);color:#fff}

/* Фоновый паттерн — как в home */
body::before{
  content:'';position:fixed;inset:0;pointer-events:none;
  background-image:radial-gradient(circle,rgba(26,158,74,.06) 1px,transparent 1px);
  background-size:28px 28px;
}
body::after{
  content:'';position:fixed;inset:0;pointer-events:none;
  background:radial-gradient(ellipse 70% 60% at 50% 0%,rgba(26,158,74,.07) 0%,transparent 65%);
}

/* ── ПРОГРЕСС ── */
.fb-bar{position:fixed;top:0;left:0;right:0;height:3px;z-index:999;
  background:linear-gradient(90deg,var(--acc),var(--acc2));
  transform-origin:left;transform:scaleX(0);transition:transform .4s var(--ease)}
.fb-bar.loading{transform:scaleX(.6)}
.fb-bar.done{transform:scaleX(1);opacity:0;transition:transform .2s,opacity .3s ease .2s}

/* ── КАРТОЧКА ── */
.card{
  position:relative;z-index:1;
  width:min(420px,calc(100vw - 32px));
  background:var(--s1);border:1.5px solid var(--b0);border-radius:24px;
  box-shadow:var(--shadow-md);
  animation:fadeUp .35s var(--ease) both;
  overflow:hidden;
}
@keyframes fadeUp{from{opacity:0;transform:translateY(18px)}to{opacity:1;transform:translateY(0)}}

/* ── ШАПКА ── */
.card-head{padding:28px 28px 0}
.logo{display:flex;align-items:center;gap:10px;margin-bottom:22px}
.logo-mark{width:36px;height:36px;border-radius:11px;background:linear-gradient(135deg,var(--acc),var(--acc2));
  display:flex;align-items:center;justify-content:center;color:#fff;box-shadow:0 4px 12px var(--acc-shadow);flex-shrink:0}
.logo-name{font-family:var(--fd);font-weight:900;font-size:.92rem;color:var(--tx);line-height:1.1}
.logo-name span{color:var(--acc)}
.logo-sub{font-size:.58rem;color:var(--tx3);font-weight:500;margin-top:1px}
.card-title{font-family:var(--fd);font-weight:900;font-size:1.55rem;color:var(--tx);letter-spacing:-.02em;line-height:1.1;margin-bottom:4px}
.card-title em{color:var(--acc);font-style:normal}
.card-sub{font-size:.74rem;color:var(--tx3);margin-bottom:20px}

/* ── ТАБЫ ── */
.tabs{display:grid;grid-template-columns:1fr 1fr;gap:4px;
  background:var(--s2);border-radius:13px;padding:4px;margin-bottom:0}
.tab{padding:9px;text-align:center;cursor:pointer;border:none;background:none;
  font-family:var(--fs);font-size:.72rem;font-weight:600;color:var(--tx3);
  border-radius:10px;transition:all var(--tf)}
.tab.active{background:var(--s1);color:var(--acc);box-shadow:0 1px 4px rgba(0,0,0,.08);font-weight:700}
.tab:hover:not(.active){color:var(--tx2)}

/* ── ТЕЛО ── */
.card-body{padding:22px 28px 28px}

/* ── АЛЕРТ ── */
.alert{display:none;align-items:flex-start;gap:9px;padding:11px 13px;margin-bottom:14px;
  border-radius:12px;font-size:.73rem;color:var(--tx2);line-height:1.5;border:1.5px solid}
.alert.show{display:flex}
.alert.err{background:rgba(220,38,38,.06);border-color:rgba(220,38,38,.2)}
.alert.ok{background:rgba(26,158,74,.07);border-color:var(--accg)}
.alert strong{display:block;font-size:.7rem;font-weight:700;margin-bottom:2px}
.alert.err strong{color:var(--red)}
.alert.ok  strong{color:var(--acc)}

/* ── ПОЛЕ ── */
.field{position:relative;margin-bottom:12px}
.lbl{font-size:.5rem;letter-spacing:.18em;text-transform:uppercase;color:var(--tx3);
  display:block;margin-bottom:5px;font-weight:600}
.inp{
  width:100%;background:var(--s2);border:1.5px solid var(--b0);border-radius:11px;
  color:var(--tx);font-family:var(--fs);font-size:.85rem;font-weight:400;
  padding:11px 14px;outline:none;transition:border-color var(--tf),box-shadow var(--tf);
}
.inp:focus{border-color:var(--acc);box-shadow:0 0 0 3px var(--accd)}
.inp.has-eye{padding-right:44px}
.inp.err{border-color:rgba(220,38,38,.5);animation:shake .32s ease}
.inp::placeholder{color:var(--tx3)}
@keyframes shake{0%,100%{transform:translateX(0)}20%,60%{transform:translateX(-5px)}40%,80%{transform:translateX(5px)}}
.field-err{font-size:.62rem;color:var(--red);margin-top:4px;display:none}
.field-err.show{display:block}

/* ── ГЛАЗ ── */
.eye{position:absolute;right:0;bottom:0;width:42px;height:42px;
  background:none;border:none;cursor:pointer;color:var(--tx3);
  display:flex;align-items:center;justify-content:center;transition:color var(--tf)}
.eye:hover{color:var(--tx2)}

/* ── СИЛА ПАРОЛЯ ── */
.ps-bars{display:flex;gap:4px;margin-top:7px}
.ps-bar{flex:1;height:3px;border-radius:2px;background:var(--s3);transition:background .3s}
.ps-lbl{font-size:.58rem;color:var(--tx3);margin-top:4px;display:none}

/* ── СТРОКА ОПЦИЙ ── */
.opt-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;gap:8px}
.remember{display:flex;align-items:center;gap:7px;font-size:.71rem;color:var(--tx3);cursor:pointer;user-select:none}
.remember input{accent-color:var(--acc);cursor:pointer;width:14px;height:14px}
.forgot{font-size:.68rem;color:var(--tx3);background:none;border:none;cursor:pointer;padding:0;
  font-family:var(--fs);transition:color var(--tf)}
.forgot:hover{color:var(--acc)}

/* ── ТЕРМИНЫ ── */
.terms{font-size:.67rem;color:var(--tx3);margin-bottom:14px;line-height:1.6}
.terms a{color:var(--acc);text-decoration:none}
.terms a:hover{text-decoration:underline}

/* ── КНОПКА САБМИТ ── */
.btn-submit{
  width:100%;padding:13px;
  background:linear-gradient(135deg,var(--acc),var(--acc2));border:none;border-radius:12px;
  color:#fff;font-family:var(--fd);font-weight:900;font-size:.78rem;letter-spacing:.06em;text-transform:uppercase;
  cursor:pointer;display:flex;align-items:center;justify-content:center;gap:9px;
  box-shadow:0 4px 16px var(--acc-shadow);transition:opacity var(--tf),transform var(--tf);
  position:relative;overflow:hidden;
}
.btn-submit:hover:not(:disabled){opacity:.9;transform:translateY(-1px);box-shadow:0 6px 20px var(--acc-shadow)}
.btn-submit:active{transform:scale(.98)}
.btn-submit:disabled{opacity:.45;cursor:not-allowed;transform:none;box-shadow:none}
.btn-submit.loading .btn-txt{opacity:.5}
.spinner{width:14px;height:14px;border-radius:50%;border:2px solid rgba(255,255,255,.3);
  border-top-color:#fff;animation:spin .7s linear infinite;display:none;flex-shrink:0}
@keyframes spin{to{transform:rotate(360deg)}}
.btn-submit.loading .spinner{display:block}

/* ── РАЗДЕЛИТЕЛЬ ── */
.divider{display:flex;align-items:center;gap:10px;margin:16px 0;
  color:var(--tx3);font-size:.58rem;letter-spacing:.18em;text-transform:uppercase}
.divider::before,.divider::after{content:'';flex:1;height:1px;background:var(--b0)}

/* ── GOOGLE ── */
.btn-google{
  width:100%;padding:11px;background:var(--s1);border:1.5px solid var(--b0);border-radius:12px;
  color:var(--tx2);font-family:var(--fs);font-size:.78rem;font-weight:500;
  cursor:pointer;display:flex;align-items:center;justify-content:center;gap:9px;
  transition:border-color var(--tf),background var(--tf),box-shadow var(--tf);
  box-shadow:var(--shadow);
}
.btn-google:hover{border-color:var(--b1);background:var(--s2);box-shadow:0 2px 8px rgba(0,0,0,.08)}
.btn-google:disabled{opacity:.45;cursor:not-allowed}

/* ── ПЕРЕКЛЮЧАТЕЛЬ ── */
.switch{text-align:center;margin-top:16px;font-size:.72rem;color:var(--tx3)}
.switch button{background:none;border:none;cursor:pointer;color:var(--acc);
  font-size:.72rem;font-family:var(--fs);font-weight:700;padding:0;transition:opacity var(--tf)}
.switch button:hover{opacity:.75}

/* ── СТАТУС ── */
.status{margin-top:18px;display:flex;align-items:center;gap:7px;
  font-size:.6rem;color:var(--tx3);letter-spacing:.04em;
  padding:10px 13px;background:var(--s2);border-radius:10px}
.status-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0;background:var(--s4);transition:background .3s}
.status-dot.ok{background:var(--acc);animation:lp 2.4s ease-in-out infinite}
.status-dot.err{background:var(--red)}
@keyframes lp{0%,100%{box-shadow:0 0 0 0 rgba(26,158,74,.35)}50%{box-shadow:0 0 0 5px rgba(26,158,74,0)}}

/* ── ГОСТЕВАЯ КНОПКА ── */
.btn-guest{
  width:100%;padding:11px;background:transparent;border:1.5px dashed var(--b1);border-radius:12px;
  color:var(--tx3);font-family:var(--fs);font-size:.73rem;font-weight:500;
  cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;
  transition:border-color var(--tf),color var(--tf),background var(--tf);margin-top:8px;
}
.btn-guest:hover{border-color:var(--acc);color:var(--acc);background:var(--accd)}

@media(max-width:480px){
  .card-head{padding:22px 20px 0}
  .card-body{padding:18px 20px 24px}
  .card-title{font-size:1.35rem}
}
</style>
</head>
<body>

<div class="fb-bar" id="fb-bar"></div>

<div class="card" role="main">

  <!-- ШАПКА -->
  <div class="card-head">
    <div class="logo">
      <div class="logo-mark">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2">
          <path d="M5 17H3a2 2 0 01-2-2V5a2 2 0 012-2h11a2 2 0 012 2v3"/>
          <rect x="9" y="11" width="14" height="10" rx="1"/>
          <circle cx="12" cy="21" r="1"/><circle cx="20" cy="21" r="1"/>
        </svg>
      </div>
      <div>
        <div class="logo-name">Galelium <span>Delivery</span></div>
        <div class="logo-sub">delivery.galelium.com</div>
      </div>
    </div>

    <div class="card-title" id="card-title">Хуш <em>омадед</em></div>
    <div class="card-sub" id="card-sub">Ворид шавед ё ҳисоб кушоед</div>

    <div class="tabs">
      <button class="tab active" id="tab-login" type="button">Ворид шудан</button>
      <button class="tab"        id="tab-reg"   type="button">Ҳисоб кушодан</button>
    </div>
  </div>

  <!-- ТЕЛО -->
  <div class="card-body">

    <!-- Алерт -->
    <div class="alert err" id="lock-alert" role="alert">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="flex-shrink:0;margin-top:1px">
        <circle cx="12" cy="12" r="10"/><path d="M12 8v4M12 16v.01" stroke-linecap="round"/>
      </svg>
      <div><strong id="alert-title"></strong><span id="alert-msg"></span></div>
    </div>

    <!-- ФОРМА ВХОДА -->
    <div id="form-login">
      <div class="field">
        <label class="lbl" for="login-email">Email</label>
        <input type="email" id="login-email" class="inp"
          placeholder="your@email.com" autocomplete="email" autofocus inputmode="email"/>
        <div class="field-err" id="err-login-email"></div>
      </div>
      <div class="field">
        <label class="lbl" for="login-pass">Парол</label>
        <input type="password" id="login-pass" class="inp has-eye"
          placeholder="••••••••" autocomplete="current-password"/>
        <button class="eye" id="eye-login" type="button" aria-label="Нишон додан">
          <svg id="eye-login-show" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
          <svg id="eye-login-hide" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" style="display:none"><path d="M17.94 17.94A10.07 10.07 0 0112 20c-7 0-11-8-11-8a18.45 18.45 0 015.06-5.94M9.9 4.24A9.12 9.12 0 0112 4c7 0 11 8 11 8a18.5 18.5 0 01-2.16 3.19m-6.72-1.07a3 3 0 11-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/></svg>
        </button>
        <div class="field-err" id="err-login-pass"></div>
      </div>
      <div class="opt-row">
        <label class="remember">
          <input type="checkbox" id="inp-remember"/> Дар хотир нигоҳ доред
        </label>
        <button class="forgot" id="btn-forgot" type="button">Паролро фаромӯш кардед?</button>
      </div>
      <button class="btn-submit" id="btn-login" type="button">
        <span class="btn-txt">Ворид шавед →</span>
        <span class="spinner" aria-hidden="true"></span>
      </button>
      <div class="switch">Ҳисоб надоред? <button id="sw-to-reg" type="button">Ҳисоб кушоед</button></div>
    </div>

    <!-- ФОРМА РЕГИСТРАЦИИ -->
    <div id="form-reg" style="display:none">
      <div class="field">
        <label class="lbl" for="reg-name">Ном ва насаб <span style="color:var(--acc)">*</span></label>
        <input type="text" id="reg-name" class="inp"
          placeholder="Алӣ Раҳимов" autocomplete="name"/>
        <div class="field-err" id="err-reg-name"></div>
      </div>
      <div class="field">
        <label class="lbl" for="reg-email">Email <span style="color:var(--acc)">*</span></label>
        <input type="email" id="reg-email" class="inp"
          placeholder="your@email.com" autocomplete="email" inputmode="email"/>
        <div class="field-err" id="err-reg-email"></div>
      </div>
      <div class="field">
        <label class="lbl" for="reg-phone">Телефон</label>
        <input type="tel" id="reg-phone" class="inp"
          placeholder="+992 00 000-00-00" autocomplete="tel" inputmode="tel"/>
      </div>
      <div class="field">
        <label class="lbl" for="reg-pass">Парол <span style="color:var(--acc)">*</span></label>
        <input type="password" id="reg-pass" class="inp has-eye"
          placeholder="Ҳадди ақал 8 аломат" autocomplete="new-password"/>
        <button class="eye" id="eye-reg" type="button" aria-label="Нишон додан">
          <svg id="eye-reg-show" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
          <svg id="eye-reg-hide" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" style="display:none"><path d="M17.94 17.94A10.07 10.07 0 0112 20c-7 0-11-8-11-8a18.45 18.45 0 015.06-5.94M9.9 4.24A9.12 9.12 0 0112 4c7 0 11 8 11 8a18.5 18.5 0 01-2.16 3.19m-6.72-1.07a3 3 0 11-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/></svg>
        </button>
        <div class="field-err" id="err-reg-pass"></div>
        <div class="ps-bars" id="pass-strength" style="display:none">
          <div class="ps-bar" id="ps1"></div><div class="ps-bar" id="ps2"></div>
          <div class="ps-bar" id="ps3"></div><div class="ps-bar" id="ps4"></div>
        </div>
        <div class="ps-lbl" id="ps-label"></div>
      </div>
      <div class="terms">
        Бо қайд шудан, шумо бо
        <a href="https://delivery.galelium.com/privacy.html" target="_blank">сиёсати махфият</a>
        розӣ мешавед.
      </div>
      <button class="btn-submit" id="btn-reg" type="button">
        <span class="btn-txt">Ҳисоб кушоед →</span>
        <span class="spinner" aria-hidden="true"></span>
      </button>
      <div class="switch">Ҳисоб доред? <button id="sw-to-login" type="button">Ворид шавед</button></div>
    </div>

    <!-- Разделитель -->
    <div class="divider">ё</div>

    <!-- Google -->
    <button class="btn-google" id="btn-google" type="button">
      <svg width="17" height="17" viewBox="0 0 48 48" aria-hidden="true">
        <path fill="#FFC107" d="M43.6 20H24v8h11.3C33.6 32.9 29.3 36 24 36c-6.6 0-12-5.4-12-12s5.4-12 12-12c3 0 5.7 1.1 7.8 2.9l5.7-5.7C34.1 6.6 29.3 4 24 4 12.9 4 4 12.9 4 24s8.9 20 20 20c11 0 20-9 20-20 0-1.3-.1-2.7-.4-4z"/>
        <path fill="#FF3D00" d="M6.3 14.7l6.6 4.8C14.6 15.9 19 13 24 13c3 0 5.7 1.1 7.8 2.9l5.7-5.7C34.1 6.6 29.3 4 24 4 16.3 4 9.7 8.4 6.3 14.7z"/>
        <path fill="#4CAF50" d="M24 44c5.2 0 9.9-1.9 13.5-5l-6.2-5.2C29.4 35.5 26.8 36 24 36c-5.2 0-9.6-3-11.4-7.4l-6.6 5.1C9.8 39.7 16.4 44 24 44z"/>
        <path fill="#1976D2" d="M43.6 20H24v8h11.3c-1 3-3.5 5.5-6.5 7l6.2 5.2C39.3 37 44 31 44 24c0-1.3-.1-2.7-.4-4z"/>
      </svg>
      <span id="google-btn-text">Тавассути Google идома диҳед</span>
    </button>

    <!-- Гость -->
    <button class="btn-guest" onclick="window.location.href='home.html'" type="button">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
      Ҳамчун меҳмон идома диҳед
    </button>

    <!-- Статус -->
    <div class="status">
      <span class="status-dot" id="status-dot"></span>
      <span id="status-text">Пайваст шудан ба Firebase…</span>
    </div>

  </div>
</div>

<script type="module">
  import { auth, db }  from './firebase.js';
  import {
    onAuthStateChanged,
    createUserWithEmailAndPassword,
    signInWithEmailAndPassword,
    signInWithPopup, GoogleAuthProvider,
    sendPasswordResetEmail, updateProfile,
    setPersistence, browserLocalPersistence, browserSessionPersistence,
  } from 'https://www.gstatic.com/firebasejs/11.8.1/firebase-auth.js';
  import { doc, getDoc, setDoc, serverTimestamp }
    from 'https://www.gstatic.com/firebasejs/11.8.1/firebase-firestore.js';

  const HOME = 'home.html';

  const fbBar      = document.getElementById('fb-bar');
  const alertEl    = document.getElementById('lock-alert');
  const alertTitle = document.getElementById('alert-title');
  const alertMsg   = document.getElementById('alert-msg');
  const statusDot  = document.getElementById('status-dot');
  const statusText = document.getElementById('status-text');
  const loginEmail = document.getElementById('login-email');
  const loginPass  = document.getElementById('login-pass');
  const remEl      = document.getElementById('inp-remember');
  const btnLogin   = document.getElementById('btn-login');
  const btnForgot  = document.getElementById('btn-forgot');
  const regName    = document.getElementById('reg-name');
  const regEmail   = document.getElementById('reg-email');
  const regPhone   = document.getElementById('reg-phone');
  const regPass    = document.getElementById('reg-pass');
  const btnReg     = document.getElementById('btn-reg');
  const btnGoogle  = document.getElementById('btn-google');
  const googleTxt  = document.getElementById('google-btn-text');
  const cardTitle  = document.getElementById('card-title');
  const cardSub    = document.getElementById('card-sub');

  // ── Профиль в Firestore ──────────────────────────────────
  async function ensureWorkerProfile(user, extra = {}) {
    const ref  = doc(db, 'users', user.uid);
    const snap = await getDoc(ref);
    if (!snap.exists()) {
      await setDoc(ref, {
        uid: user.uid, email: user.email || '',
        displayName: extra.displayName || user.displayName || '',
        phone: extra.phone || '', role: 'client',
        address: '', avatarUrl: '', provider: extra.provider || 'email',
        createdAt: serverTimestamp(), updatedAt: serverTimestamp(), lastLoginAt: serverTimestamp(),
      });
    } else {
      await setDoc(ref, { lastLoginAt: serverTimestamp(), updatedAt: serverTimestamp() }, { merge: true });
    }
  }

  // ── Auth state ───────────────────────────────────────────
  fbBar.classList.add('loading');
  onAuthStateChanged(auth, async user => {
    fbBar.classList.remove('loading');
    fbBar.classList.add('done');
    if (user) {
      statusDot.className    = 'status-dot ok';
      statusText.textContent = 'Ворид шудед · ' + (user.email || '') + ' — гузариш…';
      setTimeout(() => { window.location.href = HOME; }, 600);
    } else {
      statusDot.className    = 'status-dot ok';
      statusText.textContent = 'Firebase пайваст аст · delivery.galelium.com';
    }
  });

  // ── Переключение вход/регистрация ────────────────────────
  let currentMode = 'login';
  const tabLogin  = document.getElementById('tab-login');
  const tabReg    = document.getElementById('tab-reg');
  const formLogin = document.getElementById('form-login');
  const formReg   = document.getElementById('form-reg');

  function switchMode(mode) {
    currentMode = mode;
    const isLogin = mode === 'login';
    tabLogin.classList.toggle('active',  isLogin);
    tabReg.classList.toggle('active',   !isLogin);
    formLogin.style.display = isLogin ? '' : 'none';
    formReg.style.display   = isLogin ? 'none' : '';
    cardTitle.innerHTML     = isLogin ? 'Хуш <em>омадед</em>' : 'Ҳисоб <em>кушоед</em>';
    cardSub.textContent     = isLogin ? 'Ворид шавед ё ҳисоб кушоед' : 'Чанд сония тӯл мекашад';
    googleTxt.textContent   = isLogin ? 'Тавассути Google ворид шавед' : 'Тавассути Google қайд шавед';
    hideAlert(); clearAllErrors();
  }

  tabLogin.addEventListener('click', () => switchMode('login'));
  tabReg.addEventListener('click',   () => switchMode('reg'));
  document.getElementById('sw-to-reg').addEventListener('click',   () => switchMode('reg'));
  document.getElementById('sw-to-login').addEventListener('click', () => switchMode('login'));

  // ── Глаз пароля ─────────────────────────────────────────
  function toggleEye(inp, showEl, hideEl) {
    const vis = inp.type === 'password';
    inp.type = vis ? 'text' : 'password';
    showEl.style.display = vis ? 'none' : '';
    hideEl.style.display = vis ? '' : 'none';
    inp.focus();
  }
  document.getElementById('eye-login').addEventListener('click', () =>
    toggleEye(loginPass, document.getElementById('eye-login-show'), document.getElementById('eye-login-hide')));
  document.getElementById('eye-reg').addEventListener('click', () =>
    toggleEye(regPass, document.getElementById('eye-reg-show'), document.getElementById('eye-reg-hide')));

  // ── Сила пароля ─────────────────────────────────────────
  const psWrap = document.getElementById('pass-strength');
  const psLbl  = document.getElementById('ps-label');
  regPass.addEventListener('input', () => {
    const v = regPass.value;
    if (!v) { psWrap.style.display = 'none'; psLbl.style.display = 'none'; return; }
    psWrap.style.display = 'flex'; psLbl.style.display = 'block';
    let s = 0;
    if (v.length >= 8) s++;
    if (v.length >= 12) s++;
    if (/[A-Z]/.test(v) || /[а-яА-Я]/.test(v)) s++;
    if (/\d/.test(v) && /[^a-zA-Zа-яА-Я0-9]/.test(v)) s++;
    const cols  = ['','#dc2626','#d97706','#1a9e4a','#1a9e4a'];
    const lbls  = ['','Заиф','Миёна','Хуб','Мустаҳкам'];
    ['ps1','ps2','ps3','ps4'].forEach((id, i) => {
      document.getElementById(id).style.background = i < s ? cols[s] : 'var(--s3)';
    });
    psLbl.textContent = lbls[s]; psLbl.style.color = cols[s];
  });

  // ── Утилиты ─────────────────────────────────────────────
  function setLoading(on) {
    [btnLogin, btnReg, btnGoogle].forEach(b => b.disabled = on);
    const ab = currentMode === 'login' ? btnLogin : btnReg;
    ab.classList.toggle('loading', on);
  }
  function showAlert(title, msg, type = 'err') {
    alertEl.className      = 'alert show ' + type;
    alertTitle.textContent = title;
    alertMsg.textContent   = msg;
  }
  function showSuccess(title, msg) { showAlert(title, msg, 'ok'); }
  function hideAlert() { alertEl.classList.remove('show'); }
  function fieldErr(el, errId, msg) {
    el.classList.add('err');
    const e = document.getElementById(errId);
    if (e) { e.textContent = msg; e.classList.add('show'); }
    setTimeout(() => el.classList.remove('err'), 380);
  }
  function clearAllErrors() {
    document.querySelectorAll('.inp').forEach(e => e.classList.remove('err'));
    document.querySelectorAll('.field-err').forEach(e => e.classList.remove('show'));
    hideAlert();
  }
  function fbErr(code) {
    const m = {
      'auth/user-not-found':        ['Корбар ёфт нашуд',    'Аккаунт бо ин email вуҷуд надорад.'],
      'auth/wrong-password':        ['Парол нодуруст',       'Паролро дуруст ворид кунед ё аз нав ба даст оред.'],
      'auth/invalid-credential':    ['Маълумот нодуруст',    'Email ё парол нодуруст аст.'],
      'auth/invalid-email':         ['Email нодуруст',       'Суроғаи email-ро дуруст ворид кунед.'],
      'auth/email-already-in-use':  ['Email аллакай қайд аст','Бо ин email ворид шавед ё паролро аз нав ба даст оред.'],
      'auth/weak-password':         ['Парол заиф аст',       'Парол бояд ҳадди ақал 6 аломат дошта бошад.'],
      'auth/too-many-requests':     ['Хеле зиёд кӯшиш',     'Аккаунт муваққатан банд аст. Баъдтар кӯшиш кунед.'],
      'auth/network-request-failed':['Хатои шабака',         'Пайвасти интернетро санҷед.'],
      'auth/popup-closed-by-user':  ['Тиреза баста шуд',     'Тирезаи Google бастед. Аз нав кӯшиш кунед.'],
    };
    return m[code] || ['Хато', 'Чизе нодуруст аст. Аз нав кӯшиш кунед.'];
  }

  // ── Валидация ────────────────────────────────────────────
  function validateLogin() {
    clearAllErrors(); let ok = true;
    const email = loginEmail.value.trim();
    if (!email || !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
      fieldErr(loginEmail, 'err-login-email', email ? 'Email нодуруст аст' : 'Email-ро ворид кунед'); ok = false;
    }
    if (!loginPass.value) { fieldErr(loginPass, 'err-login-pass', 'Паролро ворид кунед'); ok = false; }
    return ok;
  }
  function validateReg() {
    clearAllErrors(); let ok = true;
    const name = regName.value.trim(), email = regEmail.value.trim(), pass = regPass.value;
    if (!name || name.length < 2) { fieldErr(regName, 'err-reg-name', 'Номро ворид кунед (ҳадди ақал 2 аломат)'); ok = false; }
    if (!email || !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) { fieldErr(regEmail, 'err-reg-email', email ? 'Email нодуруст аст' : 'Email-ро ворид кунед'); ok = false; }
    if (!pass || pass.length < 8) { fieldErr(regPass, 'err-reg-pass', 'Парол бояд ҳадди ақал 8 аломат дошта бошад'); ok = false; }
    return ok;
  }

  // ── Вход ────────────────────────────────────────────────
  async function doLogin() {
    if (!validateLogin()) return;
    setLoading(true);
    try {
      const p = remEl.checked ? browserLocalPersistence : browserSessionPersistence;
      await setPersistence(auth, p);
      const cred = await signInWithEmailAndPassword(auth, loginEmail.value.trim(), loginPass.value);
      await ensureWorkerProfile(cred.user, { provider: 'email' });
    } catch (err) {
      const [t, m] = fbErr(err.code);
      showAlert(t, m); loginPass.value = ''; loginPass.focus(); setLoading(false);
    }
  }
  btnLogin.addEventListener('click', doLogin);
  loginEmail.addEventListener('keydown', e => { if (e.key === 'Enter') loginPass.focus(); });
  loginPass.addEventListener('keydown',  e => { if (e.key === 'Enter') doLogin(); });
  [loginEmail, loginPass].forEach(el => el.addEventListener('input', () => { hideAlert(); el.classList.remove('err'); }));

  // ── Регистрация ─────────────────────────────────────────
  async function doRegister() {
    if (!validateReg()) return;
    setLoading(true);
    try {
      const cred = await createUserWithEmailAndPassword(auth, regEmail.value.trim(), regPass.value);
      await updateProfile(cred.user, { displayName: regName.value.trim() });
      await ensureWorkerProfile(cred.user, { displayName: regName.value.trim(), phone: regPhone.value.trim(), provider: 'email' });
    } catch (err) {
      const [t, m] = fbErr(err.code);
      showAlert(t, m); setLoading(false);
    }
  }
  btnReg.addEventListener('click', doRegister);
  [regName, regEmail, regPhone].forEach(el => {
    el.addEventListener('keydown', e => { if (e.key === 'Enter') regPass.focus(); });
    el.addEventListener('input', () => { hideAlert(); el.classList.remove('err'); });
  });
  regPass.addEventListener('keydown', e => { if (e.key === 'Enter') doRegister(); });

  // ── Google ───────────────────────────────────────────────
  btnGoogle.addEventListener('click', async () => {
    clearAllErrors(); setLoading(true);
    try {
      const provider = new GoogleAuthProvider();
      provider.setCustomParameters({ prompt: 'select_account' });
      const cred = await signInWithPopup(auth, provider);
      await ensureWorkerProfile(cred.user, { displayName: cred.user.displayName || '', provider: 'google' });
    } catch (err) {
      if (err.code !== 'auth/cancelled-popup-request' && err.code !== 'auth/popup-closed-by-user') {
        const [t, m] = fbErr(err.code);
        showAlert(t, m);
      }
      setLoading(false);
    }
  });

  // ── Сброс пароля ────────────────────────────────────────
  btnForgot.addEventListener('click', async () => {
    const email = loginEmail.value.trim();
    if (!email || !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
      fieldErr(loginEmail, 'err-login-email', 'Барои барқарор кардани парол email-ро ворид кунед');
      loginEmail.focus(); return;
    }
    try {
      await sendPasswordResetEmail(auth, email);
      showSuccess('Мактуб фиристода шуд', 'Почтаи ' + email + '-ро санҷед — аз он ҷо парол барқарор мешавад.');
    } catch (err) {
      const [t, m] = fbErr(err.code);
      showAlert(t, m);
    }
  });
</script>

</body>
